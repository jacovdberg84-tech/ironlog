<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>IRONLOG Work Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./styles.css?v=2" />
</head>
<body class="page-shell">
  <div class="page-header">
    <h2 style="margin:0;">Work Orders</h2>
    <div class="page-header-actions">
      <button onclick="location.href='index.html'">Dashboard</button>
      <button onclick="location.href='maintenance.html'">Maintenance</button>
    </div>
  </div>

  <section class="panel show page-section">
    <div class="card">
      <div id="woRoleBadge" class="muted" style="margin-bottom:8px;">Role: -</div>
      <div id="woPermissionLegend" class="muted" style="margin-bottom:8px;"></div>
      <div id="woKpiStrip" class="row" style="gap:8px; flex-wrap:wrap;">
        <button class="pill blue" data-kpi-filter="">All: 0</button>
        <button class="pill red" data-kpi-filter="open">Open: 0</button>
        <button class="pill orange" data-kpi-filter="in_progress">In Progress: 0</button>
        <button class="pill orange" data-kpi-filter="completed">Awaiting Approval: 0</button>
        <button class="pill blue" data-kpi-filter="approved">Approved: 0</button>
        <button class="pill blue" data-kpi-filter="closed">Closed: 0</button>
      </div>
    </div>

    <div class="card">
      <div class="row" style="gap:10px; align-items:flex-end;">
        <label>
          Status
          <select id="woStatus">
            <option value="">All</option>
            <option value="open" selected>Open</option>
            <option value="in_progress">In Progress</option>
            <option value="assigned">Assigned</option>
            <option value="completed">Completed</option>
            <option value="approved">Approved</option>
            <option value="closed">Closed</option>
          </select>
        </label>

        <label>
          Source
          <select id="woSource">
            <option value="">All</option>
            <option value="service">Service</option>
            <option value="breakdown">Breakdown</option>
            <option value="manual">Manual</option>
          </select>
        </label>

        <label>
          Search
          <input id="woSearch" type="text" placeholder="Asset code, name, WO id" />
        </label>

        <button id="woAwaitingApprovalBtn" type="button">Awaiting Approval</button>
        <button id="woRefreshBtn">Refresh</button>
      </div>
      <div id="woMessage" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Scheduling Board</h3>
      <div class="row" style="gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <label>
          Artisan
          <input id="woBoardArtisan" type="text" placeholder="All artisans" />
        </label>
        <label>
          Shift
          <select id="woBoardShift">
            <option value="">All</option>
            <option value="day">Day</option>
            <option value="night">Night</option>
          </select>
        </label>
        <label>
          Priority
          <select id="woBoardPriority">
            <option value="">All</option>
            <option value="P1">P1</option>
            <option value="P2">P2</option>
            <option value="P3">P3</option>
          </select>
        </label>
        <label>
          Due Date
          <input id="woBoardDueDate" type="date" />
        </label>
        <button id="woBoardRefreshBtn" type="button">Refresh Board</button>
        <button id="woAutoAssignBtn" type="button">Auto-Assign</button>
        <button id="woEscalationsBtn" type="button">Check Escalations</button>
      </div>
      <div id="woBoardMsg" style="margin-top:10px;" class="muted">Drag cards between artisan columns to reassign.</div>
      <div id="woBoard" class="row" style="gap:10px; margin-top:10px; align-items:stretch; overflow:auto;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Auto-Assignment Rules</h3>
      <div class="row" style="gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <label><input id="woRuleArtisan" type="text" placeholder="Artisan name" /></label>
        <label><input id="woRuleSkill" type="text" placeholder="Skill (optional)" /></label>
        <label><input id="woRuleLocation" type="text" placeholder="Location (optional)" /></label>
        <label>
          <select id="woRuleShift">
            <option value="">Any shift</option>
            <option value="day">Day</option>
            <option value="night">Night</option>
          </select>
        </label>
        <label><input id="woRuleMaxLoad" type="number" min="1" step="1" value="8" /></label>
        <button id="woRuleSaveBtn" type="button">Save Rule</button>
      </div>
      <div id="woRulesMsg" class="muted" style="margin-top:8px;"></div>
      <div id="woRulesList" style="margin-top:8px;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Escalation Chain Settings</h3>
      <div class="row" style="gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <label>Overdue Hours <input id="woEscHours" type="number" min="1" step="1" value="8" /></label>
        <label>Level 1 Role <input id="woEscRole1" type="text" value="supervisor" /></label>
        <label>Level 2 Role <input id="woEscRole2" type="text" value="manager" /></label>
        <label>Level 3 Role <input id="woEscRole3" type="text" value="admin" /></label>
        <button id="woEscSaveBtn" type="button">Save Escalation Config</button>
      </div>
      <div id="woEscMsg" class="muted" style="margin-top:8px;"></div>
      <div id="woEscList" style="margin-top:8px;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Inspection Quality Score</h3>
      <div id="woInspectionQuality" class="muted">Loading quality score...</div>
    </div>

    <div class="stack-12">
      <div id="woList" class="card-grid"></div>
    </div>

    <div class="stack-12">
      <div class="card">
        <h3 style="margin-top:0;">Work Order Detail</h3>
        <div id="woDetail">
          <div class="muted">Select "View Detail" on a work order card.</div>
        </div>
      </div>
    </div>
  </section>

  <div
    id="woCloseModal"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; padding:16px;"
  >
    <div class="card" style="width:min(680px, 100%); max-height:90vh; overflow:auto;">
      <h3 style="margin-top:0;">Complete Work Order <span id="woCloseModalTitle"></span></h3>

      <label style="display:flex; flex-direction:column; gap:6px; margin-bottom:10px;">
        Completion Notes
        <textarea id="woCloseNotes" rows="4" style="padding:10px; border-radius:8px; border:1px solid #2b3f63; background:#0b1628; color:#e8eefc;"></textarea>
      </label>

      <div class="row" style="gap:10px;">
        <label style="display:flex; flex-direction:column; gap:6px; min-width:240px; flex:1;">
          Artisan Name / Sign-off
          <input id="woCloseArtisan" type="text" />
        </label>

        <label style="display:flex; flex-direction:column; gap:6px; min-width:240px; flex:1;">
          Supervisor Name / Sign-off
          <input id="woCloseSupervisor" type="text" />
        </label>
      </div>

      <div id="woCloseModalMsg" style="margin-top:10px;"></div>

      <div class="row" style="margin-top:12px; gap:8px;">
        <button id="woCloseConfirmBtn">Complete & Close</button>
        <button id="woCloseCancelBtn" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="./workorders.js"></script>
</body>
</html>
