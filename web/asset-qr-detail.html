<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IRONLOG Asset QR Live Detail</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #151a22;
      --text: #e7edf5;
      --muted: #98a3b3;
      --accent: #3b82f6;
      --line: #253044;
      --ok: #16a34a;
      --warn: #f59e0b;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn, button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #1a2333;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      font-size: 13px;
    }
    .btn.primary, button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .pill.ok { color: #86efac; border-color: #14532d; }
    .pill.warn { color: #fde68a; border-color: #78350f; }
    .pill.bad { color: #fca5a5; border-color: #7f1d1d; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.01);
    }
    .title { font-weight: 700; margin-bottom: 4px; }
    .meta { font-size: 12px; color: var(--muted); }
    .small { font-size: 12px; }
    .empty { padding: 16px; border: 1px dashed var(--line); border-radius: 10px; color: var(--muted); }
    .kv { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin-top: 10px; }
    .kv > div { border: 1px solid var(--line); border-radius: 10px; padding: 8px; }
    .k { color: var(--muted); font-size: 12px; margin-bottom: 3px; }
    .v { font-size: 14px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="viewTitle">Asset Detail</h1>
      <div class="muted" id="sub">Loading...</div>
      <div class="row" style="margin-top:10px;">
        <button class="primary" id="refreshBtn">Refresh</button>
        <a class="btn" id="backQrBtn" href="#">Back to QR Summary</a>
      </div>
      <div class="kv">
        <div><div class="k">Asset</div><div class="v" id="assetLabel">-</div></div>
        <div><div class="k">Total Rows</div><div class="v" id="totalCount">0</div></div>
      </div>
    </div>

    <div class="card">
      <div class="list" id="list"></div>
    </div>
  </div>
  <script src="/web/asset-qr-detail.js?v=1"></script>
</body>
</html>
