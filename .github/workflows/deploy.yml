name: Deploy API to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            cd /data/ironlog
            if [ -n "$(git status --porcelain)" ]; then
              git stash push --include-untracked -m "autodeploy-$(date +%Y%m%d-%H%M%S)" || true
              git stash list | head -n 1 || true
            fi
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            cd api
            npm ci
            pm2 restart ironlog-api --update-env
            pm2 save
            for i in 1 2 3 4 5 6; do
              if curl -fsS "http://127.0.0.1:3001/health" > /dev/null; then
                echo "Health check passed."
                exit 0
              fi
              echo "Health check not ready (attempt $i/6), retrying..."
              sleep 5
            done
            echo "Health check failed after restart."
            exit 1
